services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: featureflags
    volumes:
      - selfhosted_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.selfhosted
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - '3000:3000'
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/featureflags
      DOTENV_PRIVATE_KEY_API: ${DOTENV_PRIVATE_KEY_API:-}
      DOTENV_PRIVATE_KEY_BFF: ${DOTENV_PRIVATE_KEY_BFF:-}
      DOTENV_PRIVATE_KEY_DASHBOARD: ${DOTENV_PRIVATE_KEY_DASHBOARD:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  selfhosted_postgres_data:
