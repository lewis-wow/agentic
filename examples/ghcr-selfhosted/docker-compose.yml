services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: featureflags
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/lewis-wow/agentic-selfhosted:v0.0.2
    ports:
      - '3000:3000'
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/featureflags
      DOTENV_PRIVATE_KEY_API: ${DOTENV_PRIVATE_KEY_API:-}
      DOTENV_PRIVATE_KEY_BFF: ${DOTENV_PRIVATE_KEY_BFF:-}
      DOTENV_PRIVATE_KEY_DASHBOARD: ${DOTENV_PRIVATE_KEY_DASHBOARD:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
